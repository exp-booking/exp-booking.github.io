<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>预约结果查询</title>

<link rel="icon" type="image/png" href="../images/lab_logo.png">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --notice-bg: #eff6ff;
  --notice-line: #bfdbfe;
  --shadow: 0 14px 35px rgba(15, 23, 42, 0.10);
  --radius: 18px;
}

* {
  box-sizing: border-box;
}
html {
  -webkit-text-size-adjust: 100%;
}
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 34rem),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  line-height: 1.65;
}
a {
  color: var(--primary);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
.page {
  width: min(1160px, calc(100% - 32px));
  margin: 0 auto;
  padding: 22px 0 44px;
}
.hero {
  margin-bottom: 18px;
  padding: 22px 24px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  color: #fff;
  box-shadow: var(--shadow);
}
.hero h1 {
  margin: 0 0 6px;
  font-size: clamp(24px, 4vw, 36px);
  line-height: 1.25;
  letter-spacing: -0.02em;
}
.hero p {
  margin: 0;
  width: 100%;
  max-width: none;
  color: rgba(255, 255, 255, 0.86);
  font-size: 15px;
}
.calendar-card {
  overflow: hidden;
  background: var(--card);
  border: 1px solid rgba(229, 231, 235, 0.95);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.calendar-card-header {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
}
.calendar-card-header h2 {
  margin: 0;
  font-size: 20px;
  line-height: 1.35;
}
.calendar-card-header p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.readonly-badge {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--notice-bg);
  border: 1px solid var(--notice-line);
  color: var(--primary-dark);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}
#calendar {
  padding: 16px;
}
.fc {
  --fc-border-color: #e5e7eb;
  --fc-today-bg-color: #eff6ff;
  --fc-now-indicator-color: #ef4444;
  font-size: 14px;
}
.fc .fc-toolbar.fc-header-toolbar {
  margin-bottom: 14px;
}
.fc .fc-toolbar-title {
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 750;
}
.fc .fc-button {
  border: 0;
  border-radius: 11px;
  background: var(--primary);
  box-shadow: none;
  padding: 8px 12px;
}
.fc .fc-button:hover,
.fc .fc-button:focus {
  background: var(--primary-dark);
}
.fc .fc-button-primary:not(:disabled).fc-button-active,
.fc .fc-button-primary:not(:disabled):active {
  background: #1e40af;
}
.fc .fc-col-header-cell-cushion,
.fc .fc-timegrid-axis-cushion,
.fc .fc-timegrid-slot-label-cushion {
  color: #4b5563;
}
.fc-event {
  border: 0;
  border-radius: 8px;
  padding: 2px 4px;
  cursor: pointer;
}
@media (max-width: 760px) {
  .page {
    width: min(100% - 20px, 1160px);
    padding: 12px 0 26px;
  }
  .hero {
    padding: 18px 16px;
    border-radius: 16px;
  }
  .hero p {
    font-size: 14px;
  }
  .calendar-card {
    border-radius: 16px;
  }
  .calendar-card-header {
    display: block;
    padding: 16px;
  }
  .readonly-badge {
    margin-top: 10px;
  }
  #calendar {
    padding: 10px;
  }
  .fc {
    font-size: 12px;
  }
  .fc .fc-toolbar.fc-header-toolbar {
    gap: 8px;
  }
  .fc .fc-toolbar-chunk {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .fc .fc-button {
    min-height: 38px;
    padding: 7px 10px;
    font-size: 12px;
  }
  .fc .fc-toolbar-title {
    text-align: center;
  }
  .fc .fc-timegrid-slot {
    height: 2.3em;
  }
  .fc-event-title,
  .fc-event-time {
    font-size: 11px;
  }
}
@media (max-width: 420px) {
  .fc .fc-toolbar.fc-header-toolbar {
    flex-direction: column;
  }
}
</style>
</head>

<body>
<main class="page">
  <section class="hero" aria-labelledby="page-title">
    <h1 id="page-title">预约结果查询</h1>
    <p>本页面仅用于查看已提交的预约记录，不能新增、修改或取消预约。</p>
  </section>

  <section class="notice-card" aria-label="预约规则与课题组公告">
    <div class="group-notice">
      <h3>实验室公告</h3>
      <ul class="notice-list">
        <li>名字被匿名表示预约已受理（例如，张三 → 张X），此时个人信息已无法更改。</li>
        <li>【视觉表征与计算课题组】走7月份账目的被试费已于本月15日投递到学校计财处。已全部审核通过（不含未正常更新财务信息、或未预留正确个人信息的同学），月底未收到被试费请联系课题组。</li>
      </ul>
    </div>
  </section>

  <section class="calendar-card" aria-label="预约日历">
    <div class="calendar-card-header">
      <div>
        <h2>预约日历</h2>
        <p>点击已有预约可查看时间信息。</p>
      </div>
      <span class="readonly-badge">只读模式</span>
    </div>
    <div id="calendar"></div>
  </section>
</main>

<script>
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE_NAME = "booking-sharing";

let calendar;
let bookings = [];

const mobileQuery = window.matchMedia("(max-width: 760px)");

function formatDateTime(date) {
  if (!date) return "";
  return new Date(date).toLocaleString("zh-CN", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

function formatTime(date) {
  if (!date) return "";
  return new Date(date).toLocaleTimeString("zh-CN", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

async function loadBookings() {
  const { data, error } = await sb.from(TABLE_NAME).select("id, name, group, start, end");
  if (error) {
    alert("读取预约信息失败，请刷新后再试");
    console.error(error);
    bookings = [];
    return;
  }

  bookings = (data || []).map(row => ({
    id: String(row.id),
    title: `${row.group || "未填写课题组"}｜${row.name || "匿名被试"}`,
    start: row.start,
    end: row.end,
    extendedProps: {
      name: row.name || "匿名被试",
      group: row.group || "未填写课题组"
    }
  }));
}

function renderCalendar() {
  const isMobile = mobileQuery.matches;

  calendar = new FullCalendar.Calendar(
    document.getElementById("calendar"),
    {
      initialView: "timeGridWeek",
      locale: "zh-cn",
      firstDay: 1,
      nowIndicator: true,
      selectable: false,
      editable: false,
      eventStartEditable: false,
      eventDurationEditable: false,
      eventResizableFromStart: false,
      expandRows: true,
      height: "auto",
      slotMinTime: "08:00:00",
      slotMaxTime: "20:00:00",
      slotDuration: "00:30:00",
      defaultTimedEventDuration: "01:00:00",
      allDaySlot: false,
      headerToolbar: isMobile
        ? { left: "prev,next today", center: "title", right: "timeGridWeek,timeGridDay" }
        : { left: "prev,next today", center: "title", right: "timeGridWeek,timeGridDay" },
      buttonText: {
        today: "今天",
        week: "周",
        day: "日"
      },
      slotLabelFormat: {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      },
      eventTimeFormat: {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      },
      events: bookings,
      eventClick: info => {
        const event = info.event;
        const name = event.extendedProps.name || "匿名被试";
        const group = event.extendedProps.group || "未填写课题组";
        const start = formatDateTime(event.start);
        const end = formatTime(event.end);
        alert(`预约信息\n\n被试：${name}\n课题组：${group}\n时间：${start} – ${end}\n\n本页面为只读模式，不能新增、修改或取消预约。`);
      }
    }
  );

  calendar.render();
}

(async () => {
  await loadBookings();
  renderCalendar();
})();
</script>
</body>
</html>
