<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>被试预约</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
}

#calendar {
  max-width: 900px;
  margin: 40px auto;
}

/* 弹窗 */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
}

.modal-content {
  background: #fff;
  margin: 100px auto;
  padding: 20px;
  width: 420px;
  border-radius: 10px;
  text-align: left;
}

input, select {
  width: 95%;
  padding: 8px;
  margin-top: 8px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
}
</style>
</head>

<body>

<h2>测试地点：蒲河纪检大楼343；请谨慎填写，预约无法取消。</h2>

<div id="calendar"></div>

<!-- 弹窗 -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <h3>填写信息</h3>

    <div>
      <div>开始时间：<span id="startTime"></span></div>
      <div>结束时间：<span id="endTime"></span></div>
    </div>

    <input id="studentId" placeholder="学号">
    <input id="name" placeholder="姓名">

    <select id="gender">
      <option value="">性别</option>
      <option value="男">男</option>
      <option value="女">女</option>
    </select>

    <input id="age" type="number" placeholder="年龄（周岁）">
    <input id="phone" placeholder="电话">

    <button onclick="submitBooking()">提交预约</button>
    <button onclick="closeModal()">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const TABLE_NAME = "booking-simple";

let selectedEvent = null;

// 时间格式
function formatTime(t) {
  return new Date(t).toLocaleString();
}

// 初始化日历
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'timeGridWeek',

  selectable: true,
  editable: true,

  select: function(info) {
    selectedEvent = {
      start: info.startStr,
      end: info.endStr
    };

    openModal();
  },

  eventDrop: function(info) {
    updateEvent(info.event);
  },

  eventResize: function(info) {
    updateEvent(info.event);
  },

  events: async function(fetchInfo, successCallback) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    const events = data.map(item => ({
      id: item.id,
      title: item.name,
      start: item.start_time,
      end: item.end_time
    }));

    successCallback(events);
  }

});

calendar.render();

// 打开弹窗
function openModal() {
  document.getElementById("startTime").innerText = formatTime(selectedEvent.start);
  document.getElementById("endTime").innerText = formatTime(selectedEvent.end);
  document.getElementById("bookingModal").style.display = "block";
}

// 关闭弹窗
function closeModal() {
  document.getElementById("bookingModal").style.display = "none";
}

// 提交预约
async function submitBooking() {
  const studentId = document.getElementById("studentId").value.trim();
  const name = document.getElementById("name").value.trim();
  const gender = document.getElementById("gender").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value.trim();

  // 必填校验（你要求的）
  if (!studentId || !name || !gender || !age || !phone) {
    alert("请填写完整信息");
    return;
  }

  const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      student_id: studentId,
      name: name,
      gender: gender,
      age: age,
      phone: phone,
      start_time: selectedEvent.start,
      end_time: selectedEvent.end
    })
  });

  if (res.ok) {
    alert("预约成功");
    closeModal();
    calendar.refetchEvents();
  } else {
    alert("预约失败");
  }
}

// 更新时间（拖动/拉伸）
async function updateEvent(event) {
  await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME + "?id=eq." + event.id, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      start_time: event.start.toISOString(),
      end_time: event.end.toISOString()
    })
  });
}
</script>

</body>
</html>
