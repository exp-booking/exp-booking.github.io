<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>booking-simple</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:"Microsoft YaHei",sans-serif;margin:20px;}
.top-bar{max-width:1100px;margin:0 auto 15px;display:flex;justify-content:space-between;align-items:center;}
#calendar{max-width:1100px;margin:0 auto;}
#bookingModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;}
.modal-content{background:white;max-width:420px;margin:120px auto;padding:20px;border-radius:8px;}
.modal-content input, .modal-content select{width:100%;margin-bottom:10px;}
.modal-actions{text-align:right;}
</style>
</head>

<body>

<div class="top-bar">
  <h2>booking-simple</h2>
</div>

<div id="calendar"></div>

<div id="bookingModal">
  <div class="modal-content">
    <h3>被试预约</h3>

    <label>姓名：<input id="nameInput" type="text"></label>
    <label>学号：<input id="studentIdInput" type="text"></label>
    <label>性别：
      <select id="genderInput">
        <option value="">请选择</option>
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
    </label>
    <label>年龄：<input id="ageInput" type="number"></label>

    <label>开始时间：<input id="startInput" type="datetime-local"></label>
    <label>结束时间：<input id="endInput" type="datetime-local"></label>

    <div class="modal-actions">
      <button onclick="closeModal()">关闭</button>
      <button onclick="submitBooking()">提交预约</button>
    </div>
  </div>
</div>

<script>

// ================= Supabase =================
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE_NAME = "booking-simple";

let calendar;
let bookings = [];

// ================= 加载数据 =================
async function loadBookings(){
  const { data, error } = await sb.from(TABLE_NAME).select("*");
  if(error){
    alert("加载失败: " + error.message);
    return;
  }

  bookings = (data || []).map(row => ({
    id: String(row.id),
    title: row.name,
    start: row.start,
    end: row.end
  }));
}

// ================= 日历 =================
function renderCalendar(){
  calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {

    initialView:"timeGridWeek",
    locale:"zh-cn",
    nowIndicator:true,
    selectable:true,
    editable:false,   //  不允许修改
    slotMinTime:"08:00:00",
    slotMaxTime:"22:00:00",

    headerToolbar:{
      left:"prev,next today",
      center:"title",
      right:"timeGridWeek,timeGridDay"
    },

    events:bookings,

    dateClick:(info)=>openModal(info.date)
  });

  calendar.render();
}

// ================= 弹窗 =================
function openModal(date){

  const pad = n => String(n).padStart(2,"0");
  const d = new Date(date);

  const startLocal =
    `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

  const d2 = new Date(d.getTime()+30*60000);
  const endLocal =
    `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}T${pad(d2.getHours())}:${pad(d2.getMinutes())}`;

  startInput.value = startLocal;
  endInput.value = endLocal;

  bookingModal.style.display="block";
}

function closeModal(){
  bookingModal.style.display="none";
  document.querySelectorAll("#bookingModal input, #bookingModal select")
    .forEach(el=>el.value="");
}

// ================= 提交 =================
async function submitBooking(){

  const name = nameInput.value.trim();
  const studentId = studentIdInput.value.trim();
  const gender = genderInput.value;
  const age = ageInput.value.trim();
  const start = startInput.value;
  const end = endInput.value;

  // 必填检查
  if(!name || !studentId || !gender || !age || !start || !end){
    alert("所有字段必须填写");
    return;
  }

  if(new Date(end) <= new Date(start)){
    alert("结束时间必须晚于开始时间");
    return;
  }

  // 冲突检测
  for(const ev of bookings){
    if(!(new Date(end) <= new Date(ev.start) ||
         new Date(start) >= new Date(ev.end))){
      alert("该时间段已被预约");
      return;
    }
  }

  const { data, error } = await sb
    .from(TABLE_NAME)
    .insert([{
      name,
      studentId,
      gender,
      age,
      start,
      end
    }])
    .select();

  if(error){
    alert("提交失败: " + error.message);
    return;
  }

  const row = data[0];

  calendar.addEvent({
    id:String(row.id),
    title:row.name,
    start:row.start,
    end:row.end
  });

  bookings.push({
    id:String(row.id),
    start:row.start,
    end:row.end
  });

  closeModal();
}

// ================= 启动 =================
(async()=>{
