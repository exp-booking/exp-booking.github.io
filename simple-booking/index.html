<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>被试预约</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
}

/* 日历 */
#calendar {
  max-width: 900px;
  margin: 40px auto;
}

/* 弹窗（关键：解决点不到问题） */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 9999;
}

.modal-content {
  background: white;
  width: 400px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  z-index: 10000;
  position: relative;
}

input, select {
  width: 90%;
  padding: 8px;
  margin-top: 8px;
}

button {
  margin-top: 10px;
  padding: 8px 15px;
}
</style>
</head>

<body>

<h2>实验地点为蒲河校区纪检大楼343；预约无法取消，请谨慎填写。</h2>

<div id="calendar"></div>

<!-- 弹窗 -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <h3>填写被试信息</h3>

    <input id="studentId" placeholder="学号"><br>
    <input id="name" placeholder="姓名"><br>
    <select id="gender">
      <option value="">性别</option>
      <option value="男">男</option>
      <option value="女">女</option>
    </select><br>

    <input id="age" type="number" placeholder="年龄（周岁）"><br>
    <input id="phone" placeholder="电话"><br>

    <button onclick="submitBooking()">提交预约</button>
    <button onclick="closeModal()">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const TABLE_NAME = "booking-simple";

let selectedStart = null;
let selectedEnd = null;

//
const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
  initialView: 'timeGridWeek',
  selectable: true,

  select: function(info) {
    selectedStart = info.startStr;
    selectedEnd = info.endStr;
    openModal();
  }
});

calendar.render();

// 
function openModal() {
  document.getElementById("bookingModal").style.display = "block";
}

//
function closeModal() {
  document.getElementById("bookingModal").style.display = "none";
}

//
async function submitBooking() {
  const studentId = document.getElementById("studentId").value.trim();
  const name = document.getElementById("name").value.trim();
  const gender = document.getElementById("gender").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value.trim();

  //
  if (!studentId || !name || !gender || !age || !phone) {
    alert("请填写完整信息");
    return;
  }

  const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      student_id: studentId,
      name: name,
      gender: gender,
      age: age,
      phone: phone,
      start_time: selectedStart,
      end_time: selectedEnd
    })
  });

  if (res.ok) {
    alert("预约成功");
    closeModal();
    location.reload();
  } else {
    alert("预约失败");
  }
}
</script>

</body>
</html>
