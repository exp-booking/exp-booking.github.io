<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>被试预约</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body { font-family: Arial; text-align: center; }
#calendar { max-width: 1000px; margin: 40px auto; }

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  left: 0;
  top: 0;
}

.modal-content {
  background: white;
  margin: 80px auto;
  padding: 20px;
  width: 420px;
  border-radius: 10px;
  text-align: left;
}

input, select { width: 95%; margin-top: 8px; padding: 6px; }
button { margin-top: 10px; }
</style>
</head>

<body>

<h2>实验地点请见招募广告；请谨慎填写预约信息，预约无法取消。</h2>
<div id="calendar"></div>

<div id="bookingModal" class="modal">
  <div class="modal-content">

    <div>开始：<span id="startTime"></span></div>
    <div>结束：<span id="endTime"></span></div>

    <input id="studentId" placeholder="学号">
    <input id="name" placeholder="姓名">

    <select id="gender">
      <option value="">性别</option>
      <option>男</option>
      <option>女</option>
    </select>

    <input id="age" type="number" placeholder="年龄">
    <input id="phone" placeholder="电话">

    <button onclick="submitBooking()">提交</button>
    <button onclick="closeModal()">关闭</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const TABLE_NAME = "booking-simple";

let selected = null;

function format(t){
  return new Date(t).toLocaleString();
}

const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

  initialView: 'timeGridWeek',

  headerToolbar:{
    left:'prev,next today',
    center:'title',
    right:'timeGridWeek,timeGridDay'
  },

  selectable:true,
  editable:true,
  nowIndicator:true,

  slotDuration:'00:30:00',
  slotMinTime:'08:00:00',
  slotMaxTime:'22:00:00',

  // ✅ 关键：强制所有事件可编辑
  eventStartEditable: true,
  eventDurationEditable: true,

  select(info){
    selected = info;
    document.getElementById("startTime").innerText = format(info.start);
    document.getElementById("endTime").innerText = format(info.end);
    document.getElementById("bookingModal").style.display = "block";
  },

  async events(fetchInfo, success){
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME,{
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      }
    });

    const data = await res.json();

    success(data.map(d=>({
      id: d.id,                 // ❗必须有
      title: d.name,
      start: d.start_time,
      end: d.end_time,
      editable: true           // ❗关键修复点
    })));
  },

  async eventDrop(info){
    await update(info.event);
  },

  async eventResize(info){
    await update(info.event);
  }

});

calendar.render();

function closeModal(){
  document.getElementById("bookingModal").style.display="none";
}

async function submitBooking(){

  const studentId = document.getElementById("studentId").value.trim();
  const name = document.getElementById("name").value.trim();
  const gender = document.getElementById("gender").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value.trim();

  if(!studentId||!name||!gender||!age||!phone){
    alert("请填写完整信息");
    return;
  }

  const res = await fetch(SUPABASE_URL+"/rest/v1/"+TABLE_NAME,{
    method:"POST",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      student_id:studentId,
      name:name,
      gender:gender,
      age:age,
      phone:phone,
      start_time:selected.startStr,
      end_time:selected.endStr
    })
  });

  if(res.ok){
    alert("成功");
    closeModal();
    calendar.refetchEvents();
  }
}

async function update(event){
  await fetch(SUPABASE_URL+"/rest/v1/"+TABLE_NAME+"?id=eq."+event.id,{
    method:"PATCH",
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      start_time:event.start.toISOString(),
      end_time:event.end.toISOString()
    })
  });
}
</script>

</body>
</html>
