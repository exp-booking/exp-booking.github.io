<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>被试专用预约系统</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
  body {
    font-family: "Microsoft YaHei";
    text-align: center;
  }

  #calendar {
    max-width: 900px;
    margin: 40px auto;
  }

  /* 弹窗 */
  #modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
  }

  #modal-box {
    background:#fff;
    padding:25px;
    border-radius:10px;
    width:300px;
  }

  #modal-box input {
    width:100%;
    margin-bottom:10px;
    padding:6px;
  }

</style>
</head>

<body>

<h2>实验地点纪检大楼343（请谨慎填写！预约不可取消！）</h2>

<div id="calendar"></div>

<!-- 弹窗 -->
<div id="modal">
  <div id="modal-box">
    <h3>填写预约信息</h3>

    <input id="student_id" placeholder="学号">
    <input id="name" placeholder="姓名">
    <input id="gender" placeholder="性别">
    <input id="age" placeholder="年龄">
    <input id="phone" placeholder="电话">

    <div style="text-align:right;">
      <button onclick="closeModal()">取消</button>
      <button onclick="submitBooking()">提交</button>
    </div>
  </div>
</div>

<script>

const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedTime = null;

document.addEventListener('DOMContentLoaded', async function () {

  const { data } = await supabaseClient
    .from("booking-simple")
    .select("*");

  const events = data.map(item => ({
    title: item.name + "（" + item.student_id + "）",
    start: item.start,
    end: item.end
  }));

  const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridWeek',
    selectable: true,

    select: function(info) {
      selectedTime = info;
      document.getElementById("modal").style.display = "flex";
    },

    events: events

    // 不允许删除
  });

  calendar.render();
});

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

async function submitBooking() {

  const student_id = document.getElementById("student_id").value.trim();
  const name = document.getElementById("name").value.trim();
  const gender = document.getElementById("gender").value.trim();
  const age = document.getElementById("age").value.trim();
  const phone = document.getElementById("phone").value.trim();

  // ✅ 必填校验
  if (!student_id || !name || !gender || !age || !phone) {
    alert("请填写所有信息");
    return;
  }

  if (isNaN(age)) {
    alert("年龄必须为数字");
    return;
  }

  // 冲突检测
  const { data: conflict } = await supabaseClient
    .from("booking-simple")
    .select("*")
    .lte("start", selectedTime.endStr)
    .gte("end", selectedTime.startStr);

  if (conflict && conflict.length > 0) {
    alert("该时间段已被预约");
    return;
  }

  // ✅ 写入数据库
  const { error } = await supabaseClient
    .from("booking-simple")
    .insert([
      {
        student_id,
        name,
        gender,
        age: parseInt(age),
        phone,
        start: selectedTime.startStr,
        end: selectedTime.endStr
      }
    ]);

  if (error) {
    alert("预约失败：" + error.message);
  } else {
    alert("预约成功");
    location.reload();
  }
}

</script>

</body>
</html>
