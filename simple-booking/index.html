<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>被试预约</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
#calendar { max-width: 1000px; margin: 40px auto; }
</style>
</head>

<body>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const SUPABASE_URL = "https://ipqvhykwlvzagbffhdzp.supabase.co";
const SUPABASE_KEY = "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM";
const TABLE_NAME = "booking-simple";

const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

  initialView: 'timeGridWeek',
  editable: true,
  selectable: true,
  nowIndicator: true,

  eventStartEditable: true,
  eventDurationEditable: true,

  async events(fetchInfo, success) {

    const res = await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });

    const data = await res.json();

    console.log("数据库数据👇", data); // 🔥关键：打开F12看

    success(data.map(d => ({
      id: String(d.id),   // ❗强制转字符串（关键修复）
      title: d.name || "预约",
      start: d.start_time,
      end: d.end_time,
      editable: true
    })));

  },

  eventDrop(info) {
    console.log("拖动触发", info.event.id);

    updateEvent(info.event);
  },

  eventResize(info) {
    console.log("拉伸触发", info.event.id);

    updateEvent(info.event);
  }

});

calendar.render();

async function updateEvent(event) {

  console.log("正在更新", event.id);

  await fetch(SUPABASE_URL + "/rest/v1/" + TABLE_NAME + "?id=eq." + event.id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      start_time: event.start.toISOString(),
      end_time: event.end.toISOString()
    })
  });

}
</script>

</body>
</html>
