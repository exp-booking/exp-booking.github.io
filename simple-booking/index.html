<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>被试专用预约</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;margin:20px;}
#calendar{max-width:1100px;margin:auto;}
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
}
.box{
  background:white;
  width:420px;
  margin:80px auto;
  padding:20px;
  border-radius:8px;
}
.box input, .box select{
  width:100%;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>测试地点见招聘广告；请谨慎填写信息，预约无法取消。</h2>
<div id="calendar"></div>

<div id="modal">
  <div class="box">
    <h3>填写预约信息</h3>

    姓名<input id="name">
    学号<input id="studentId">
    性别
    <select id="gender">
      <option value="">请选择</option>
      <option>男</option>
      <option>女</option>
    </select>
    年龄<input id="age" type="number">

    开始时间<input id="start" type="datetime-local">
    结束时间<input id="end" type="datetime-local">

    <button onclick="submitBooking()">确认预约</button>
    <button onclick="closeModal()">取消</button>
  </div>
</div>

<script>

// ===== Supabase =====
const sb = supabase.createClient(
  "https://ipqvhykwlvzagbffhdzp.supabase.co",
  "sb_publishable_Nv9QOCAV0sD-sTgYeCFKfQ_QOCMXmrM"
);

const TABLE = "booking-simple";

let calendar;
let events = [];

// ===== 加载已有预约 =====
async function load(){
  const { data } = await sb.from(TABLE).select("*");

  events = (data || []).map(r => ({
    id:String(r.id),
    title:r.name,
    start:r.start,
    end:r.end,
    editable:false
  }));
}

// ===== 初始化日历 =====
function initCalendar(){
  calendar = new FullCalendar.Calendar(
    document.getElementById("calendar"),
    {
      initialView:"timeGridWeek",
      selectable:true,
      editable:false,          // 禁止修改
      nowIndicator:true,

      headerToolbar:{
        left:"prev,next today",
        center:"title",
        right:"timeGridWeek,timeGridDay"
      },

      events:events,

      dateClick:(info)=>openModal(info.date)
    }
  );

  calendar.render();
}

// ===== 打开弹窗 =====
function openModal(date){

  const d = new Date(date);
  const pad=n=>String(n).padStart(2,"0");

  start.value =
    `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

  const d2 = new Date(d.getTime()+30*60000);
  end.value =
    `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}T${pad(d2.getHours())}:${pad(d2.getMinutes())}`;

  modal.style.display="block";
}

function closeModal(){
  modal.style.display="none";
}

// ===== 提交预约 =====
async function submitBooking(){

  const name = name.value.trim();
  const studentId = studentId.value.trim();
  const gender = gender.value;
  const age = age.value.trim();
  const startTime = start.value;
  const endTime = end.value;

  // 必填检查
  if(!name || !studentId || !gender || !age || !startTime || !endTime){
    alert("所有信息必须填写");
    return;
  }

  if(new Date(endTime) <= new Date(startTime)){
    alert("结束时间必须晚于开始时间");
    return;
  }

  // 冲突检测
  for(const ev of events){
    if(!(new Date(endTime) <= new Date(ev.start) ||
         new Date(startTime) >= new Date(ev.end))){
      alert("时间冲突，无法预约");
      return;
    }
  }

  const { data, error } = await sb
    .from(TABLE)
    .insert([{
      name,
      studentId,
      gender,
      age,
      start:startTime,
      end:endTime
    }])
    .select();

  if(error){
    alert(error.message);
    return;
  }

  const row = data[0];

  calendar.addEvent({
    id:String(row.id),
    title:row.name,
    start:row.start,
    end:row.end,
    editable:false
  });

  closeModal();
}

// ===== 启动 =====
(async()=>{
  await load();
  initCalendar();
})();

</script>
</body>
</html>
